[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "https://cleanness.app/*"
  to = "https://www.cleanness.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Canonical URLs use .html — redirect pretty paths to avoid duplicate indexing
[[redirects]]
  from = "/about-cleanness"
  to = "/about-cleanness.html"
  status = 301
  force = true

